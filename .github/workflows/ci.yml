name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff + black)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install lint tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff black

      - name: Ruff
        run: ruff check src tests scripts

      - name: Black (check only)
        run: black --check src tests scripts

  unit-tests:
    name: Unit tests (no API key)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run unit tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: python -m unittest tests.test_unit -v

  integration-tests:
    name: Integration tests (live OpenRouter)
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    # Only run on push to main or when explicitly dispatched — keeps PR cost zero.
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'))
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Build minimal SQLite fixture
        run: |
          mkdir -p data
          python - <<'PY'
          import sqlite3
          conn = sqlite3.connect("data/gaming_mental_health.sqlite")
          conn.execute("""
            CREATE TABLE IF NOT EXISTS gaming_mental_health (
              age INTEGER, gender TEXT, addiction_level REAL, anxiety_score REAL
            )
          """)
          conn.executemany(
            "INSERT INTO gaming_mental_health VALUES (?,?,?,?)",
            [(21,'M',7.5,6.1),(34,'F',3.2,2.8),(28,'M',5.0,4.4)],
          )
          conn.commit()
          conn.close()
          PY

      - name: Run public integration tests
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          PYTHONPATH: ${{ github.workspace }}
        run: |
          if [ -z "$OPENROUTER_API_KEY" ]; then
            echo "OPENROUTER_API_KEY secret not set — skipping live integration tests."
            exit 0
          fi
          python -m unittest tests.test_public -v
