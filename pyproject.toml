[tool.ruff]
line-length = 100
target-version = "py311"
extend-exclude = ["data", ".venv"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "UP"]
ignore = [
  "E501",  # line length handled by black
  "B008",  # default arg call ok for dataclass defaults
  "E402",  # tests/scripts adjust sys.path before imports
]

[tool.black]
line-length = 100
target-version = ["py311"]
exclude = '''
/(
    \.venv
  | data
)/
'''
